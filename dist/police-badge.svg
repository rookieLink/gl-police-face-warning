<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 280" width="240" height="280">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700"/>
      <stop offset="50%" style="stop-color:#FFC125"/>
      <stop offset="100%" style="stop-color:#DAA520"/>
    </linearGradient>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#003399"/>
      <stop offset="100%" style="stop-color:#001a66"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- 盾牌主体 -->
  <path d="M120 20 L210 55 L210 155 Q210 215 120 250 Q30 215 30 155 L30 55 Z" 
        fill="url(#blueGrad)" stroke="url(#goldGrad)" stroke-width="6"/>
  
  <!-- 盾牌内边框 -->
  <path d="M120 32 L202 63 L202 153 Q202 208 120 240 Q38 208 38 153 L38 63 Z" 
        fill="none" stroke="url(#goldGrad)" stroke-width="2"/>
  
  <!-- 五角星 -->
  <g filter="url(#glow)">
    <polygon points="120,55 132,85 165,85 138,102 148,132 120,115 92,132 102,102 75,85 108,85" 
             fill="url(#goldGrad)"/>
  </g>
  
  <!-- 天安门城楼 -->
  <g fill="url(#goldGrad)">
    <!-- 城楼主体 -->
    <rect x="80" y="150" width="80" height="40" rx="2"/>
    <!-- 城楼屋顶 -->
    <path d="M72 150 L120 125 L168 150 Z"/>
    <!-- 城楼垛口 -->
    <rect x="82" y="140" width="10" height="13"/>
    <rect x="96" y="140" width="10" height="13"/>
    <rect x="110" y="140" width="10" height="13"/>
    <rect x="124" y="140" width="10" height="13"/>
    <rect x="138" y="140" width="10" height="13"/>
    <rect x="152" y="140" width="10" height="13"/>
    <!-- 城门 -->
    <rect x="110" y="165" width="20" height="25" rx="10"/>
    <!-- 城墙 -->
    <rect x="72" y="190" width="96" height="10" rx="1"/>
  </g>
  
  <!-- 齿轮 -->
  <g fill="url(#goldGrad)" stroke="url(#goldGrad)" stroke-width="1">
    <circle cx="55" cy="130" r="15" fill="none" stroke-width="4"/>
    <rect x="52" y="112" width="6" height="8"/>
    <rect x="52" y="140" width="6" height="8"/>
    <rect x="37" y="127" width="8" height="6"/>
    <rect x="65" y="127" width="8" height="6"/>
    <rect x="40" y="115" width="6" height="6" transform="rotate(-45 43 118)"/>
    <rect x="64" y="115" width="6" height="6" transform="rotate(45 67 118)"/>
    <rect x="40" y="139" width="6" height="6" transform="rotate(45 43 142)"/>
    <rect x="64" y="139" width="6" height="6" transform="rotate(-45 67 142)"/>
  </g>
  
  <!-- 麦穗 左侧 -->
  <g fill="url(#goldGrad)">
    <ellipse cx="48" cy="80" rx="4" ry="8" transform="rotate(-20 48 80)"/>
    <ellipse cx="44" cy="65" rx="4" ry="7" transform="rotate(-15 44 65)"/>
    <ellipse cx="42" cy="50" rx="3" ry="6" transform="rotate(-10 42 50)"/>
    <ellipse cx="52" cy="95" rx="4" ry="8" transform="rotate(-25 52 95)"/>
    <ellipse cx="55" cy="110" rx="3" ry="6" transform="rotate(-30 55 110)"/>
    <path d="M58 120 Q42 95 46 55" stroke="url(#goldGrad)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 麦穗 右侧 -->
  <g fill="url(#goldGrad)">
    <ellipse cx="192" cy="80" rx="4" ry="8" transform="rotate(20 192 80)"/>
    <ellipse cx="196" cy="65" rx="4" ry="7" transform="rotate(15 196 65)"/>
    <ellipse cx="198" cy="50" rx="3" ry="6" transform="rotate(10 198 50)"/>
    <ellipse cx="188" cy="95" rx="4" ry="8" transform="rotate(25 188 95)"/>
    <ellipse cx="185" cy="110" rx="3" ry="6" transform="rotate(30 185 110)"/>
    <path d="M182 120 Q198 95 194 55" stroke="url(#goldGrad)" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 松枝 左侧 -->
  <g fill="#228B22" stroke="#1a6b1a" stroke-width="0.5">
    <ellipse cx="28" cy="90" rx="5" ry="10" transform="rotate(-25 28 90)"/>
    <ellipse cx="24" cy="72" rx="4" ry="8" transform="rotate(-20 24 72)"/>
    <ellipse cx="22" cy="55" rx="3" ry="6" transform="rotate(-15 22 55)"/>
    <ellipse cx="32" cy="108" rx="4" ry="8" transform="rotate(-30 32 108)"/>
    <ellipse cx="35" cy="125" rx="3" ry="6" transform="rotate(-35 35 125)"/>
    <path d="M38 135 Q22 105 25 60" stroke="#228B22" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 松枝 右侧 -->
  <g fill="#228B22" stroke="#1a6b1a" stroke-width="0.5">
    <ellipse cx="212" cy="90" rx="5" ry="10" transform="rotate(25 212 90)"/>
    <ellipse cx="216" cy="72" rx="4" ry="8" transform="rotate(20 216 72)"/>
    <ellipse cx="218" cy="55" rx="3" ry="6" transform="rotate(15 218 55)"/>
    <ellipse cx="208" cy="108" rx="4" ry="8" transform="rotate(30 208 108)"/>
    <ellipse cx="205" cy="125" rx="3" ry="6" transform="rotate(35 205 125)"/>
    <path d="M202 135 Q218 105 215 60" stroke="#228B22" stroke-width="2" fill="none"/>
  </g>
  
  <!-- 底部绶带 -->
  <path d="M70 220 Q120 235 170 220 Q175 225 170 230 Q120 245 70 230 Q65 225 70 220" 
        fill="#CC0000" stroke="#990000" stroke-width="1"/>
  <text x="120" y="232" text-anchor="middle" fill="url(#goldGrad)" 
        font-size="16" font-weight="bold" font-family="SimHei, Microsoft YaHei, Arial">警察</text>
</svg>
